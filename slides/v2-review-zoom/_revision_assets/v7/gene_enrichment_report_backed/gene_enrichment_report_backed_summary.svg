    <text x="590" y="646" font-size="20" fill="#1f2937">9 C7-specific MTCO pseudogene rows</text>
    <text x="590" y="676" font-size="18" fill="#6b7280">Candidate signal; BH q = 0.07118</text>

    <rect x="1060" y="575" width="470" height="122" rx="8" fill="#edf4fb" stroke="#c8d6e5"/>
    <text x="1085" y="612" font-size="23" font-weight="700" fill="#17324d">Duplicon backbone</text>
    <text x="1085" y="646" font-size="20" fill="#1f2937">RPL23A, SEPTIN14, DDX11L, FAM138, WASH</text>
