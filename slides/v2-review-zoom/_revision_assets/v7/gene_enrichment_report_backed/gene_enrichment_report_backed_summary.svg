  <text x="105" y="236" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1f2937">116 community-family Fisher rows</text>
  <text x="105" y="273" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1f2937">0 BH-significant rows</text>
  <text x="105" y="310" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1f2937">Near-miss candidates: C3 OR and C7 MTCO, BH q = 0.07118</text>

  <rect x="810" y="155" width="720" height="185" rx="10" fill="#fff8e8" stroke="#d4820a" stroke-width="2"/>
  <text x="845" y="196" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#7a4a00">Interpretation guardrail</text>
  <text x="845" y="236" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1f2937">Say: report-backed presence patterns and recurrent architecture</text>
  <text x="845" y="273" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1f2937">Avoid: BH-significant GO enrichment proves X</text>
  <text x="845" y="310" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1f2937">GO tables are context/method contrast unless revalidated</text>

  <text x="70" y="396" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#17324d">Report-backed signals to keep</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="70" y="425" width="470" height="122" rx="8" fill="#edf4fb" stroke="#c8d6e5"/>
