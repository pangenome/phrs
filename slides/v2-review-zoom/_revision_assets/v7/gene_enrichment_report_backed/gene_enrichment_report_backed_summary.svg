<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Report-backed gene enrichment summary with conservative statistics">
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="96" fill="#17324d"/>
  <text x="70" y="61" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#ffffff">Gene enrichment: report-backed biology, conservative statistics</text>
  <text x="70" y="124" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#4b5563">Use recurrent gene-family architecture / copy-aware candidate signal. Do not call this BH-significant GO proof.</text>

