    <text x="95" y="646" font-size="20" fill="#1f2937">32.1% protein-coding content</text>
    <text x="95" y="676" font-size="18" fill="#6b7280">SHOX, GTPBP6, P2RY8, PLCXD1, PPP2R3B</text>

