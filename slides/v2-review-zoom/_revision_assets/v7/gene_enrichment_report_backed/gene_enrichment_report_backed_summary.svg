  <text x="105" y="812" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1f2937">Lead with HPRCv2 report/table rows. Show standard/coding-only GO and exploratory copy-weighted ORA only as clearly labeled method contrast.</text>
  <text x="70" y="870" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6b7280">Sources: subtelomeric_analysis_report.md section 9; end-to-end-report/report/03_gene_enrichment.md; HPRCv2 enrichment TSVs; parked GO/ORA brainstorming tables.</text>
